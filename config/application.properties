# Oracle
oracle.jdbcUrl=jdbc:oracle:thin:@//host:1521/service
oracle.username=APP_USER
oracle.password=APP_PASSWORD

# Query must return one column containing the FileNet document id/GUID.
oracle.query=select FILENET_ID from YOUR_TABLE where FILENET_ID is not null

# FileNet Content Platform Engine
filenet.uri=http://host:port/wsi/FNCEWS40MTOM
filenet.username=FILENET_USER
filenet.password=FILENET_PASSWORD
filenet.stanza=FileNetP8WSI
filenet.objectStore=OBJECT_STORE_NAME

# Download location
download.baseDir=C:/filenet-downloads
