# Oracle
oracle.jdbcUrl=jdbc:oracle:thin:@//host:1521/service
oracle.username=APP_USER
oracle.password=APP_PASSWORD

# Select query must return these exact aliases:
# RECORD_ID  - primary key or unique row id used for update
# FILENET_ID - FileNet document id/GUID
oracle.selectSql=select ID as RECORD_ID, FILENET_ID as FILENET_ID from YOUR_TABLE where FILENET_ID is not null and DOWNLOAD_STATUS is null
oracle.fetchSize=100

# Success update parameter order:
# 1 = downloaded file count, 2 = local folder path, 3 = RECORD_ID
oracle.successUpdateSql=update YOUR_TABLE set DOWNLOAD_STATUS = 'SUCCESS', DOWNLOADED_FILE_COUNT = ?, DOWNLOAD_FOLDER = ?, PROCESSED_DATE = systimestamp, ERROR_MESSAGE = null where ID = ?

# Failure update parameter order:
# 1 = error message, 2 = RECORD_ID
oracle.failureUpdateSql=update YOUR_TABLE set DOWNLOAD_STATUS = 'FAILED', ERROR_MESSAGE = ?, PROCESSED_DATE = systimestamp where ID = ?

# FileNet Content Platform Engine
filenet.uri=http://host:port/wsi/FNCEWS40MTOM
filenet.username=FILENET_USER
filenet.password=FILENET_PASSWORD
filenet.stanza=FileNetP8WSI
filenet.objectStore=OBJECT_STORE_NAME

# Download location
download.baseDir=C:/filenet-downloads
